<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>killo</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0c; color: #e8e8ec;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 2rem 1.5rem; overflow-x: hidden; overflow-y: auto;
    }
    #canvas-bg {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%; z-index: 0; display: block;
    }
    .content {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center;
      pointer-events: none;
    }
    .content * { pointer-events: auto; }

    .avatar-wrapper {
      position: relative; margin-bottom: 1.25rem; cursor: pointer;
    }
    .avatar-wrapper::before {
      content: ''; position: absolute; inset: -8px; border-radius: 50%;
      background: radial-gradient(circle, rgba(120, 200, 255, 0.25) 0%, transparent 70%);
      animation: avatar-glow 3s ease-in-out infinite;
    }
    .avatar {
      position: relative; width: 120px; height: 120px; border-radius: 50%;
      object-fit: cover; border: 3px solid #2a2a32; display: block;
      transition: border-color 0.3s;
    }
    .avatar-wrapper:hover .avatar { border-color: #4a5a6a; }
    @keyframes avatar-glow {
      0%, 100% { transform: scale(0.9); opacity: 0.5; }
      50% { transform: scale(1.2); opacity: 1; }
    }
    .name {
      font-size: 2rem; font-weight: 700; letter-spacing: -0.02em;
      margin-bottom: 2rem; color: #f0f0f4; position: relative;
    }
    .name::after {
      content: ''; position: absolute; left: 0; right: 0; bottom: -6px; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
    }

    .card-stack {
      position: relative;
      width: 480px;
      max-width: 100%;
      min-height: 260px;
    }
    .card {
      width: 100%;
      border-radius: 14px; padding: 2rem 2.5rem;
      background: #121216; border: 1px solid #1e1e24;
      overflow: hidden;
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
    .card::before {
      content: ''; position: absolute; top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(120, 200, 255, 0.03), transparent);
      animation: scan 6s ease-in-out infinite; pointer-events: none;
    }
    @keyframes scan {
      0% { left: -100%; } 50% { left: 100%; } 100% { left: 100%; }
    }
    .card::after {
      content: ''; position: absolute; top: -1px; left: -1px; right: -1px; bottom: -1px;
      border-radius: 15px; border: 1px solid transparent;
      background: linear-gradient(135deg, rgba(120,200,255,0.15), transparent 40%, transparent 60%, rgba(120,200,255,0.05)) border-box;
      -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none;
    }
    .card-stack .card {
      position: absolute; top: 0; left: 0;
      opacity: 0; transform: scale(0.95) translateY(10px);
      pointer-events: none;
    }
    .card-stack .card.active {
      position: relative;
      opacity: 1; transform: scale(1) translateY(0);
      pointer-events: auto;
    }
    .card-content { display: flex; flex-direction: column; justify-content: center; }
    .card-title {
      font-size: 0.75rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.08em; color: #6b6b78;
      margin-bottom: 1rem; padding-bottom: 0.75rem; border-bottom: 1px solid #1e1e24;
    }
    .card-icon { font-size: 2.5rem; margin-bottom: 0.75rem; line-height: 1; }
    .card-item {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.6rem 0; font-size: 0.95rem;
    }
    .card-item + .card-item { border-top: 1px solid #1e1e24; }
    .card-item-label {
      color: #888894; font-weight: 500; font-size: 0.8rem;
      text-transform: uppercase; letter-spacing: 0.04em; min-width: 60px;
    }
    .card-item-value { color: #e8e8ec; font-weight: 500; }
    .footer {
      margin-top: 1.5rem; font-size: 0.7rem; text-align: center;
      color: #404048; letter-spacing: 0.04em;
    }
    .hint {
      margin-top: 0.75rem; font-size: 0.65rem; color: #30303a;
      letter-spacing: 0.06em;
    }

    /* ── Mobile ── */
    @media (max-width: 540px) {
      body {
        justify-content: flex-start;
        padding: 2.5rem 1rem 2rem;
      }
      .avatar-wrapper { margin-bottom: 0.75rem; }
      .avatar { width: 80px; height: 80px; }
      .avatar-wrapper::before { inset: -5px; }
      .name {
        font-size: 1.4rem; margin-bottom: 1.25rem;
      }
      .card-stack { min-height: 180px; }
      .card { padding: 1rem 1.25rem; border-radius: 12px; }
      .card-title {
        font-size: 0.65rem; margin-bottom: 0.6rem; padding-bottom: 0.5rem;
      }
      .card-icon { font-size: 1.5rem; margin-bottom: 0.5rem; }
      .card-item { padding: 0.35rem 0; font-size: 0.82rem; gap: 0.5rem; }
      .card-item-label { font-size: 0.7rem; min-width: 48px; }
      .hint { margin-top: 0.5rem; }
      .footer { margin-top: 1rem; }
    }
  </style>
</head>
<body>
  <canvas id="canvas-bg"></canvas>
  <div class="content">
    <div class="avatar-wrapper" id="avatarBtn" title="Click to reset">
      <img class="avatar" src="./avatar.jpg" alt="killo avatar">
    </div>
    <h1 class="name">killo</h1>

    <div class="card-stack" id="cardStack">
      <div class="card active" data-card="0">
        <div class="card-content">
          <div class="card-title">EARTH ONLINE PLAYER INFO</div>
          <div class="card-item">
            <span class="card-item-label">ID</span>
            <span class="card-item-value">killo</span>
          </div>
          <div class="card-item">
            <span class="card-item-label">LV</span>
            <span class="card-item-value">21</span>
          </div>
          <div class="card-item">
            <span class="card-item-label">SIGN</span>
            <span class="card-item-value" style="color:#b0b0bc;font-style:italic;">&ldquo;Keep it locked, oblivion&rdquo;</span>
          </div>
        </div>
      </div>
      <div class="card" data-card="1">
        <div class="card-content">
          <div class="card-icon">🍽️</div>
          <div class="card-title">FAVORITE FOODS</div>
          <div class="card-item">
            <span class="card-item-label">01</span>
            <span class="card-item-value">🍔 Hamburger</span>
          </div>
          <div class="card-item">
            <span class="card-item-label">02</span>
            <span class="card-item-value">🥤 Cola</span>
          </div>
          <div class="card-item">
            <span class="card-item-label">03</span>
            <span class="card-item-value">🥚 Egg Custard</span>
          </div>
        </div>
      </div>
      <div class="card" data-card="2">
        <div class="card-content">
          <div class="card-icon">💫</div>
          <div class="card-title">WANTS</div>
          <div class="card-item">
            <span class="card-item-label">01</span>
            <span class="card-item-value">🐱 Have a cat</span>
          </div>
          <div class="card-item">
            <span class="card-item-label">02</span>
            <span class="card-item-value">🏠 Have a home</span>
          </div>
          <div class="card-item">
            <span class="card-item-label">03</span>
            <span class="card-item-value">💤 Sleep with loved one</span>
          </div>
        </div>
      </div>
    </div>

    <div class="hint" id="hint">-</div>
    <div class="footer">/etc/profile</div>
  </div>
  <script>
    var canvas = document.getElementById('canvas-bg');
    var ctx = canvas.getContext('2d');
    var W, H;
    function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
    resize(); window.addEventListener('resize', resize);

    var STAR_COUNT = 200;
    var bgStars = [];
    for (var i = 0; i < STAR_COUNT; i++) {
      bgStars.push({ x: Math.random(), y: Math.random(), r: 0.5 + Math.random() * 1.5, speed: 0.3 + Math.random() * 0.7, phase: Math.random() * Math.PI * 2, baseOpacity: 0.1 + Math.random() * 0.4 });
    }

    var virgoStars = [
      { label: 'Zavijava', x: 0.18, y: 0.22 }, { label: 'Zaniah', x: 0.48, y: 0.16 },
      { label: 'Vindemiatrix', x: 0.72, y: 0.12 }, { label: 'Minelauva', x: 0.40, y: 0.36 },
      { label: 'Porrima', x: 0.30, y: 0.52 }, { label: 'Auva', x: 0.58, y: 0.58 },
      { label: 'Syrma', x: 0.22, y: 0.68 }, { label: 'Spica', x: 0.45, y: 0.85 },
    ];
    var virgoEdges = [[0,1],[0,3],[1,2],[1,3],[3,4],[4,5],[4,6],[4,7],[5,7]];
    var virgoMotion = { baseX: 0.75, baseY: 0.25, size: 0.18, time: 0, orbitRadiusX: 0.08, orbitRadiusY: 0.05, orbitSpeed: 0.0015, orbitPhaseY: 1.3 };

    var decorations = [
      { name: 'Cassiopeia', stars: [{x:0.1,y:0.1},{x:0.3,y:0.0},{x:0.5,y:0.15},{x:0.7,y:0.0},{x:0.9,y:0.1}], edges: [[0,1],[1,2],[2,3],[3,4]], baseX: 0.12, baseY: 0.12, size: 0.07, time: 0, orbitRadiusX: 0.04, orbitRadiusY: 0.02, orbitSpeed: 0.0008, orbitPhaseY: 0.7, color: '200, 180, 255' },
      { name: 'Big Dipper', stars: [{x:0.2,y:0.0},{x:0.4,y:0.0},{x:0.55,y:0.15},{x:0.35,y:0.22},{x:0.65,y:0.22},{x:0.8,y:0.38},{x:1.0,y:0.55}], edges: [[0,1],[1,2],[2,3],[3,0],[2,4],[4,5],[5,6]], baseX: 0.85, baseY: 0.8, size: 0.09, time: 0, orbitRadiusX: 0.03, orbitRadiusY: 0.04, orbitSpeed: 0.0006, orbitPhaseY: 1.1, color: '180, 220, 255' },
      { name: 'Leo', stars: [{x:0.0,y:0.4},{x:0.15,y:0.25},{x:0.05,y:0.1},{x:0.25,y:0.1},{x:0.4,y:0.2},{x:0.35,y:0.4}], edges: [[0,1],[1,2],[2,3],[3,4],[4,5],[0,5]], baseX: 0.45, baseY: 0.78, size: 0.08, time: 0, orbitRadiusX: 0.05, orbitRadiusY: 0.03, orbitSpeed: 0.001, orbitPhaseY: 0.5, color: '220, 190, 255' },
      { name: 'Orion', stars: [{x:0.2,y:0.1},{x:0.7,y:0.15},{x:0.35,y:0.45},{x:0.5,y:0.5},{x:0.65,y:0.45},{x:0.25,y:0.85},{x:0.75,y:0.8}], edges: [[0,1],[2,3],[3,4],[0,2],[1,4],[2,5],[4,6]], baseX: 0.15, baseY: 0.7, size: 0.1, time: 0, orbitRadiusX: 0.04, orbitRadiusY: 0.02, orbitSpeed: 0.0007, orbitPhaseY: 0.9, color: '200, 220, 240' },
    ];

    var cards = document.querySelectorAll('.card');
    var hint = document.getElementById('hint');
    var currentCard = 0;

    function switchToCard(index) {
      cards.forEach(function(c, i) { c.classList.toggle('active', i === index); });
      currentCard = index;
      hint.textContent = ['earth online', 'favorite foods', 'wants'][index];
    }

    document.getElementById('avatarBtn').addEventListener('click', function() { switchToCard(0); });

    var mouseX = -1, mouseY = -1, hoveredStarIdx = -1;
    canvas.addEventListener('mousemove', function(e) { mouseX = e.clientX; mouseY = e.clientY; });
    canvas.addEventListener('mouseleave', function() { mouseX = -1; mouseY = -1; if (hoveredStarIdx >= 0) { hoveredStarIdx = -1; canvas.style.cursor = 'default'; } });
    canvas.addEventListener('click', function(e) {
      if (hoveredStarIdx === 0) switchToCard(1);
      else if (hoveredStarIdx === 1) switchToCard(2);
    });

    function getAbsStars(data, cx, cy, scale) {
      var r = [];
      for (var i = 0; i < data.length; i++) r.push({ absX: cx + (data[i].x - 0.5) * scale, absY: cy + (data[i].y - 0.5) * scale });
      return r;
    }

    function draw(time) {
      ctx.clearRect(0, 0, W, H);
      for (var b = 0; b < bgStars.length; b++) {
        var s = bgStars[b]; var op = s.baseOpacity + Math.sin(time * 0.002 * s.speed + s.phase) * 0.3;
        ctx.beginPath(); ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,' + Math.max(0, op) + ')'; ctx.fill();
      }
      for (var d = 0; d < decorations.length; d++) {
        var dec = decorations[d]; dec.time += 1;
        var dt = dec.time * dec.orbitSpeed;
        var cx2 = W * (dec.baseX + Math.sin(dt) * dec.orbitRadiusX);
        var cy2 = H * (dec.baseY + Math.cos(dt * dec.orbitPhaseY) * dec.orbitRadiusY);
        var sc = Math.min(W, H) * dec.size;
        var ds = getAbsStars(dec.stars, cx2, cy2, sc);
        ctx.beginPath();
        for (var e = 0; e < dec.edges.length; e++) { ctx.moveTo(ds[dec.edges[e][0]].absX, ds[dec.edges[e][0]].absY); ctx.lineTo(ds[dec.edges[e][1]].absX, ds[dec.edges[e][1]].absY); }
        ctx.strokeStyle = 'rgba(' + dec.color + ',0.1)'; ctx.lineWidth = 0.8; ctx.stroke();
        for (var i = 0; i < ds.length; i++) { ctx.beginPath(); ctx.arc(ds[i].absX, ds[i].absY, 1.2, 0, Math.PI * 2); ctx.fillStyle = 'rgba(' + dec.color + ',0.45)'; ctx.fill(); }
      }
      virgoMotion.time += 1;
      var vt = virgoMotion.time * virgoMotion.orbitSpeed;
      var vcx = W * (virgoMotion.baseX + Math.sin(vt) * virgoMotion.orbitRadiusX);
      var vcy = H * (virgoMotion.baseY + Math.cos(vt * virgoMotion.orbitPhaseY) * virgoMotion.orbitRadiusY);
      var vsc = Math.min(W, H) * virgoMotion.size;
      var vs = getAbsStars(virgoStars, vcx, vcy, vsc);
      ctx.beginPath();
      for (var e = 0; e < virgoEdges.length; e++) { ctx.moveTo(vs[virgoEdges[e][0]].absX, vs[virgoEdges[e][0]].absY); ctx.lineTo(vs[virgoEdges[e][1]].absX, vs[virgoEdges[e][1]].absY); }
      ctx.strokeStyle = 'rgba(150, 200, 255, 0.04)'; ctx.lineWidth = 5; ctx.stroke();
      ctx.beginPath();
      for (var e = 0; e < virgoEdges.length; e++) { ctx.moveTo(vs[virgoEdges[e][0]].absX, vs[virgoEdges[e][0]].absY); ctx.lineTo(vs[virgoEdges[e][1]].absX, vs[virgoEdges[e][1]].absY); }
      ctx.strokeStyle = 'rgba(150, 200, 255, 0.12)'; ctx.lineWidth = 1; ctx.stroke();
      hoveredStarIdx = -1;
      for (var i = 0; i < vs.length; i++) {
        var st = vs[i]; var dx = mouseX - st.absX; var dy = mouseY - st.absY;
        var hov = (Math.sqrt(dx*dx+dy*dy) < 14 && mouseX >= 0);
        if (hov) { hoveredStarIdx = i; canvas.style.cursor = 'pointer'; }
        var grd = ctx.createRadialGradient(st.absX, st.absY, 0, st.absX, st.absY, hov ? 24 : 14);
        grd.addColorStop(0, hov ? 'rgba(200,230,255,0.6)' : 'rgba(150,200,255,0.15)');
        grd.addColorStop(1, 'transparent');
        ctx.beginPath(); ctx.arc(st.absX, st.absY, hov ? 24 : 14, 0, Math.PI * 2); ctx.fillStyle = grd; ctx.fill();
        ctx.beginPath(); ctx.arc(st.absX, st.absY, hov ? 4 : 2.5, 0, Math.PI * 2); ctx.fillStyle = hov ? '#d0e8ff' : 'rgba(180, 215, 255, 0.7)'; ctx.fill();
        if (hov) { ctx.font = '11px Inter, sans-serif'; ctx.fillStyle = 'rgba(180, 210, 255, 0.8)'; ctx.textAlign = 'center'; ctx.fillText('VIRGO . ' + virgoStars[i].label, st.absX, st.absY - 18); }
      }
      requestAnimationFrame(draw);
    }
    requestAnimationFrame(draw);
  </script>
</body>
</html>
