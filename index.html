<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>killo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0d0d0d;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .container {
            max-width: 640px;
            width: 100%;
            text-align: center;
        }

        .avatar-wrapper {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            overflow: hidden;
            margin: 0 auto 24px;
            border: 3px solid #333;
            box-shadow: 0 0 30px rgba(100, 100, 255, 0.15);
        }

        .avatar-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            font-size: 2.4rem;
            font-weight: 600;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 1rem;
            color: #888;
            margin-bottom: 48px;
            letter-spacing: 1px;
        }

        .section {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            text-align: left;
            transition: border-color 0.2s;
        }

        .section:focus-within {
            border-color: #555;
        }

        .section-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #666;
            margin-bottom: 12px;
        }

        .editable {
            font-size: 1rem;
            line-height: 1.7;
            color: #ccc;
            outline: none;
            min-height: 1.7em;
        }

        .editable:empty::before {
            content: attr(data-placeholder);
            color: #444;
        }

        .footer {
            margin-top: 40px;
            font-size: 0.85rem;
            color: #444;
        }

        .footer a {
            color: #666;
            text-decoration: none;
        }
        .footer a:hover {
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="avatar-wrapper">
            <img src="IMG_6308.JPG" alt="killo">
        </div>

        <h1>killo</h1>
        <p class="subtitle">/ˈkɪloʊ/</p>

        <div class="section">
            <div class="section-label">关于我</div>
            <div class="editable" contenteditable="true" data-placeholder="写一段自我介绍……"></div>
        </div>

        <div class="section">
            <div class="section-label">最近在做</div>
            <div class="editable" contenteditable="true" data-placeholder="分享你最近在忙什么……"></div>
        </div>

        <div class="footer">
            <a href="https://github.com/killo3313" target="_blank">GitHub</a>
        </div>
    </div>
</body>
</html>
