<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>killo</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0c; color: #e8e8ec;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 2rem; overflow-x: hidden; overflow-y: auto;
    }
    #canvas-bg {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%; z-index: 0; display: block;
    }
    .content {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center;
      pointer-events: none; width: 100%;
    }
    .content * { pointer-events: auto; }
    .avatar-wrapper {
      position: relative; margin-bottom: 1.5rem; cursor: pointer;
    }
    .avatar-wrapper::before {
      content: ''; position: absolute; inset: -8px; border-radius: 50%;
      background: radial-gradient(circle, rgba(120, 200, 255, 0.25) 0%, transparent 70%);
      animation: avatar-glow 3s ease-in-out infinite;
    }
    .avatar {
      position: relative; width: 110px; height: 110px; border-radius: 50%;
      object-fit: cover; border: 3px solid #2a2a32; display: block;
    }
    @keyframes avatar-glow {
      0%, 100% { transform: scale(0.9); opacity: 0.5; }
      50% { transform: scale(1.2); opacity: 1; }
    }
    .name {
      font-size: 1.75rem; font-weight: 700; letter-spacing: -0.02em;
      margin-bottom: 2rem; color: #f0f0f4; text-align: center;
    }
    .name::after {
      content: ''; display: block; margin: 6px auto 0;
      width: 60%; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
    }
    .card-stack {
      position: relative;
      width: 420px;
      max-width: 100%;
      min-height: 240px;
    }
    .card {
      width: 100%;
      border-radius: 14px; padding: 1.5rem 1.75rem;
      background: #121216; border: 1px solid #1e1e24;
      overflow: hidden;
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
    .card.stacked {
      position: absolute; top: 0; left: 0;
      opacity: 0; transform: scale(0.94) translateY(10px);
      pointer-events: none;
    }
    .card.active {
      position: relative;
      opacity: 1; transform: scale(1) translateY(0);
      pointer-events: auto;
    }
    .card::before {
      content: ''; position: absolute; top: 0; left: -100%;
      width: 100%; height: 100%; pointer-events: none;
      background: linear-gradient(90deg, transparent, rgba(120, 200, 255, 0.03), transparent);
      animation: scan 6s ease-in-out infinite;
    }
    @keyframes scan {
      0% { left: -100%; } 50% { left: 100%; } 100% { left: 100%; }
    }
    .card::after {
      content: ''; position: absolute; top: -1px; left: -1px; right: -1px; bottom: -1px;
      border-radius: 15px; border: 1px solid transparent; pointer-events: none;
      background: linear-gradient(135deg, rgba(120,200,255,0.15), transparent 40%, transparent 60%, rgba(120,200,255,0.05)) border-box;
      -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor; mask-composite: exclude;
    }
    .card-title {
      font-size: 0.65rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.06em; color: #6b6b78;
      margin-bottom: 0.6rem; padding-bottom: 0.5rem;
      border-bottom: 1px solid #1e1e24; word-break: break-word;
    }
    .card-icon { font-size: 1.75rem; margin-bottom: 0.4rem; line-height: 1; }
    .card-item {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.4rem 0; font-size: 0.85rem;
    }
    .card-item + .card-item { border-top: 1px solid #1e1e24; }
    .card-item-label {
      color: #888894; font-weight: 500; font-size: 0.7rem;
      text-transform: uppercase; letter-spacing: 0.03em; min-width: 50px;
      flex-shrink: 0;
    }
    .card-item-value { color: #e8e8ec; font-weight: 500; word-break: break-word; }
    .footer { margin-top: 1.5rem; font-size: 0.65rem; text-align: center; color: #404048; letter-spacing: 0.04em; }
    .hint { margin-top: 0.75rem; font-size: 0.6rem; color: #30303a; letter-spacing: 0.06em; text-align: center; }

    @media (max-width: 540px) {
      body { padding: 1rem; }
      .avatar-wrapper { margin-bottom: 1rem; }
      .avatar { width: 80px; height: 80px; }
      .avatar-wrapper::before { inset: -5px; }
      .name { font-size: 1.3rem; margin-bottom: 1.25rem; }
      .name::after { width: 50%; margin-top: 4px; }
      .card-stack { min-height: 190px; }
      .card { padding: 0.9rem 1rem; border-radius: 12px; }
      .card-title { font-size: 0.58rem; margin-bottom: 0.4rem; padding-bottom: 0.35rem; }
      .card-icon { font-size: 1.2rem; margin-bottom: 0.3rem; }
      .card-item { padding: 0.3rem 0; font-size: 0.75rem; gap: 0.4rem; }
      .card-item-label { font-size: 0.6rem; min-width: 38px; }
      .footer { margin-top: 1rem; }
      .hint { margin-top: 0.5rem; }
    }
  </style>
</head>
<body>
  <canvas id="canvas-bg"></canvas>
  <div class="content">
    <div class="avatar-wrapper" id="avatarBtn">
      <img class="avatar" src="./avatar.jpg" alt="killo avatar">
    </div>
    <h1 class="name">killo</h1>
    <div class="card-stack" id="cardStack">
      <div class="card active" data-card="0">
        <div class="card-title">EARTH ONLINE PLAYER INFO</div>
        <div class="card-item"><span class="card-item-label">ID</span><span class="card-item-value">killo</span></div>
        <div class="card-item"><span class="card-item-label">LV</span><span class="card-item-value">21</span></div>
        <div class="card-item"><span class="card-item-label">SIGN</span><span class="card-item-value" style="color:#b0b0bc;font-style:italic;">&ldquo;Keep it locked, oblivion&rdquo;</span></div>
      </div>
      <div class="card stacked" data-card="1">
        <div class="card-icon">&#x1f37d;&#xfe0f;</div>
        <div class="card-title">FAVORITE FOODS</div>
        <div class="card-item"><span class="card-item-label">01</span><span class="card-item-value">&#x1f354; Hamburger</span></div>
        <div class="card-item"><span class="card-item-label">02</span><span class="card-item-value">&#x1f964; Cola</span></div>
        <div class="card-item"><span class="card-item-label">03</span><span class="card-item-value">&#x1f95a; Egg Custard</span></div>
      </div>
      <div class="card stacked" data-card="2">
        <div class="card-icon">&#x1f4ab;</div>
        <div class="card-title">WANTS</div>
        <div class="card-item"><span class="card-item-label">01</span><span class="card-item-value">&#x1f431; Cat</span></div>
        <div class="card-item"><span class="card-item-label">02</span><span class="card-item-value">&#x1f3e0; Home</span></div>
        <div class="card-item"><span class="card-item-label">03</span><span class="card-item-value">&#x1f4a4; Sleep with loved one</span></div>
      </div>
    </div>
    <div class="hint" id="hint">-</div>
    <div class="footer">/etc/profile</div>
  </div>
  <script>
    var c = document.getElementById('canvas-bg'), x = c.getContext('2d'), W, H;
    function rs() { W = c.width = innerWidth; H = c.height = innerHeight; }
    rs(); addEventListener('resize', rs);
    var bs = [];
    for (var i = 0; i < 200; i++) bs.push({x:Math.random(),y:Math.random(),r:0.5+Math.random()*1.5,sp:0.3+Math.random()*0.7,ph:Math.random()*7,bo:0.1+Math.random()*0.4});
    var vs = [{l:'Zavijava',x:0.18,y:0.22},{l:'Zaniah',x:0.48,y:0.16},{l:'Vindemiatrix',x:0.72,y:0.12},{l:'Minelauva',x:0.40,y:0.36},{l:'Porrima',x:0.30,y:0.52},{l:'Auva',x:0.58,y:0.58},{l:'Syrma',x:0.22,y:0.68},{l:'Spica',x:0.45,y:0.85}];
    var ve = [[0,1],[0,3],[1,2],[1,3],[3,4],[4,5],[4,6],[4,7],[5,7]];
    var vm = {bx:0.75,by:0.25,sz:0.18,t:0,ox:0.08,oy:0.05,os:0.0015,py:1.3};
    var dc = [{n:'Cas',s:[{x:0.1,y:0.1},{x:0.3,y:0},{x:0.5,y:0.15},{x:0.7,y:0},{x:0.9,y:0.1}],e:[[0,1],[1,2],[2,3],[3,4]],bx:0.12,by:0.12,sz:0.07,t:0,ox:0.04,oy:0.02,os:0.0008,py:0.7,cl:'200,180,255'},{n:'Dip',s:[{x:0.2,y:0},{x:0.4,y:0},{x:0.55,y:0.15},{x:0.35,y:0.22},{x:0.65,y:0.22},{x:0.8,y:0.38},{x:1,y:0.55}],e:[[0,1],[1,2],[2,3],[3,0],[2,4],[4,5],[5,6]],bx:0.85,by:0.8,sz:0.09,t:0,ox:0.03,oy:0.04,os:0.0006,py:1.1,cl:'180,220,255'},{n:'Leo',s:[{x:0,y:0.4},{x:0.15,y:0.25},{x:0.05,y:0.1},{x:0.25,y:0.1},{x:0.4,y:0.2},{x:0.35,y:0.4}],e:[[0,1],[1,2],[2,3],[3,4],[4,5],[0,5]],bx:0.45,by:0.78,sz:0.08,t:0,ox:0.05,oy:0.03,os:0.001,py:0.5,cl:'220,190,255'},{n:'Ori',s:[{x:0.2,y:0.1},{x:0.7,y:0.15},{x:0.35,y:0.45},{x:0.5,y:0.5},{x:0.65,y:0.45},{x:0.25,y:0.85},{x:0.75,y:0.8}],e:[[0,1],[2,3],[3,4],[0,2],[1,4],[2,5],[4,6]],bx:0.15,by:0.7,sz:0.1,t:0,ox:0.04,oy:0.02,os:0.0007,py:0.9,cl:'200,220,240'}];
    var cards = document.querySelectorAll('.card'), hint = document.getElementById('hint'), cur = 0;
    function sw(i) {
      cards.forEach(function(c, j) {
        if (j === i) { c.classList.remove('stacked'); c.classList.add('active'); }
        else { c.classList.remove('active'); c.classList.add('stacked'); }
      });
      cur = i; hint.textContent = ['earth online','favorite foods','wants'][i];
    }
    document.getElementById('avatarBtn').addEventListener('click', function(){sw(0);});
    var mx=-1,my=-1,hi=-1;
    c.addEventListener('mousemove',function(e){mx=e.clientX;my=e.clientY;});
    c.addEventListener('mouseleave',function(){mx=-1;my=-1;if(hi>=0){hi=-1;c.style.cursor='default';}});
    c.addEventListener('click',function(){if(hi===0)sw(1);else if(hi===1)sw(2);});
    function gA(d,cx,cy,sc){var r=[];for(var i=0;i<d.length;i++)r.push({x:cx+(d[i].x-0.5)*sc,y:cy+(d[i].y-0.5)*sc});return r;}
    function dr(t){
      x.clearRect(0,0,W,H);
      for(var b=0;b<bs.length;b++){var s=bs[b],o=s.bo+Math.sin(t*0.002*s.sp+s.ph)*0.3;x.beginPath();x.arc(s.x*W,s.y*H,s.r,0,7);x.fillStyle='rgba(255,255,255,'+Math.max(0,o)+')';x.fill();}
      for(var d=0;d<dc.length;d++){var a=dc[d];a.t+=1;var tt=a.t*a.os,ex=W*(a.bx+Math.sin(tt)*a.ox),ey=H*(a.by+Math.cos(tt*a.py)*a.oy),sc=Math.min(W,H)*a.sz,ds=gA(a.s,ex,ey,sc);x.beginPath();for(var e=0;e<a.e.length;e++){x.moveTo(ds[a.e[e][0]].x,ds[a.e[e][0]].y);x.lineTo(ds[a.e[e][1]].x,ds[a.e[e][1]].y);}x.strokeStyle='rgba('+a.cl+',0.1)';x.lineWidth=0.8;x.stroke();for(var i=0;i<ds.length;i++){x.beginPath();x.arc(ds[i].x,ds[i].y,1.2,0,7);x.fillStyle='rgba('+a.cl+',0.45)';x.fill();}}
      vm.t+=1;var vt=vm.t*vm.os,vcx=W*(vm.bx+Math.sin(vt)*vm.ox),vcy=H*(vm.by+Math.cos(vt*vm.py)*vm.oy),vsc=Math.min(W,H)*vm.sz,vs2=gA(vs,vcx,vcy,vsc);
      x.beginPath();for(var e=0;e<ve.length;e++){x.moveTo(vs2[ve[e][0]].x,vs2[ve[e][0]].y);x.lineTo(vs2[ve[e][1]].x,vs2[ve[e][1]].y);}x.strokeStyle='rgba(150,200,255,0.04)';x.lineWidth=5;x.stroke();
      x.beginPath();for(var e=0;e<ve.length;e++){x.moveTo(vs2[ve[e][0]].x,vs2[ve[e][0]].y);x.lineTo(vs2[ve[e][1]].x,vs2[ve[e][1]].y);}x.strokeStyle='rgba(150,200,255,0.12)';x.lineWidth=1;x.stroke();
      hi=-1;
      for(var i=0;i<vs2.length;i++){var s=vs2[i],dx=mx-s.x,dy=my-s.y,h=(Math.sqrt(dx*dx+dy*dy)<14&&mx>=0);if(h){hi=i;c.style.cursor='pointer';}var g=x.createRadialGradient(s.x,s.y,0,s.x,s.y,h?24:14);g.addColorStop(0,h?'rgba(200,230,255,0.6)':'rgba(150,200,255,0.15)');g.addColorStop(1,'transparent');x.beginPath();x.arc(s.x,s.y,h?24:14,0,7);x.fillStyle=g;x.fill();x.beginPath();x.arc(s.x,s.y,h?4:2.5,0,7);x.fillStyle=h?'#d0e8ff':'rgba(180,215,255,0.7)';x.fill();if(h){x.font='11px Inter, sans-serif';x.fillStyle='rgba(180,210,255,0.8)';x.textAlign='center';x.fillText('VIRGO . '+vs[i].l,s.x,s.y-18);}}
      requestAnimationFrame(dr);
    }
    requestAnimationFrame(dr);
  </script>
</body>
</html>
