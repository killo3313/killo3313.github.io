<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>killo</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0c; color: #e8e8ec;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 2rem; overflow-x: hidden; overflow-y: auto;
    }
    #canvas-bg {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%; z-index: 0; display: block;
    }
    .content {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center;
      pointer-events: none; max-width: 100%;
    }
    .content * { pointer-events: auto; }

    .avatar-wrapper {
      position: relative; margin-bottom: 1.5rem; cursor: pointer;
    }
    .avatar-wrapper::before {
      content: ''; position: absolute; inset: -8px; border-radius: 50%;
      background: radial-gradient(circle, rgba(120, 200, 255, 0.25) 0%, transparent 70%);
      animation: avatar-glow 3s ease-in-out infinite;
    }
    .avatar {
      position: relative; width: 110px; height: 110px; border-radius: 50%;
      object-fit: cover; border: 3px solid #2a2a32; display: block;
    }
    @keyframes avatar-glow {
      0%, 100% { transform: scale(0.9); opacity: 0.5; }
      50% { transform: scale(1.2); opacity: 1; }
    }
    .name {
      font-size: 1.75rem; font-weight: 700; letter-spacing: -0.02em;
      margin-bottom: 2rem; color: #f0f0f4; white-space: nowrap;
    }
    .name::after {
      content: ''; display: block; margin: 6px auto 0;
      width: 60%; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
    }

    /* ©¤©¤ Card container: fixed height, no position switching ©¤©¤ */
    .card-stack {
      position: relative;
      width: 460px;
      max-width: 100%;
      height: 260px;
    }

    .card {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border-radius: 14px; padding: 1.75rem 2rem;
      background: #121216; border: 1px solid #1e1e24;
      overflow-y: auto;
      transition: opacity 0.4s ease, transform 0.4s ease;
      /* hidden by default */
      opacity: 0; transform: scale(0.94) translateY(10px);
      pointer-events: none;
    }
    .card.active {
      opacity: 1; transform: scale(1) translateY(0);
      pointer-events: auto;
    }
    .card::-webkit-scrollbar { width: 3px; }
    .card::-webkit-scrollbar-thumb { background: #2a2a32; border-radius: 2px; }

    /* scan line */
    .card::before {
      content: ''; position: absolute; top: 0; left: -100%;
      width: 100%; height: 100%; pointer-events: none;
      background: linear-gradient(90deg, transparent, rgba(120, 200, 255, 0.03), transparent);
      animation: scan 6s ease-in-out infinite;
    }
    @keyframes scan {
      0% { left: -100%; } 50% { left: 100%; } 100% { left: 100%; }
    }
    /* corner accent */
    .card::after {
      content: ''; position: absolute; top: -1px; left: -1px; right: -1px; bottom: -1px;
      border-radius: 15px; border: 1px solid transparent; pointer-events: none;
      background: linear-gradient(135deg, rgba(120,200,255,0.15), transparent 40%, transparent 60%, rgba(120,200,255,0.05)) border-box;
      -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor; mask-composite: exclude;
    }

    .card-content { display: flex; flex-direction: column; justify-content: center; height: 100%; }
    .card-title {
      font-size: 0.7rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.08em; color: #6b6b78;
      margin-bottom: 0.75rem; padding-bottom: 0.6rem; border-bottom: 1px solid #1e1e24;
    }
    .card-icon { font-size: 2rem; margin-bottom: 0.5rem; line-height: 1; }
    .card-item {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.5rem 0; font-size: 0.9rem;
    }
    .card-item + .card-item { border-top: 1px solid #1e1e24; }
    .card-item-label {
      color: #888894; font-weight: 500; font-size: 0.75rem;
      text-transform: uppercase; letter-spacing: 0.04em; min-width: 56px;
    }
    .card-item-value { color: #e8e8ec; font-weight: 500; }

    .footer { margin-top: 1.5rem; font-size: 0.65rem; text-align: center; color: #404048; letter-spacing: 0.04em; }
    .hint { margin-top: 0.75rem; font-size: 0.6rem; color: #30303a; letter-spacing: 0.06em; }

    /* ¨T¨T¨T¨T¨T¨T¨T¨T¨T¨T¨T¨T¨T¨T¨T¨T¨T¨T¨T¨T¨T¨T¨T¨T¨T¨T¨T¨T¨T¨T¨T¨T¨T¨T¨T¨T
       MOBILE
       ¨T¨T¨T¨T¨T¨T¨T¨T¨T¨T¨T¨T¨T¨T¨T¨T¨T¨T¨T¨T¨T¨T¨T¨T¨T¨T¨T¨T¨T¨T¨T¨T¨T¨T¨T¨T */
    @media (max-width: 540px) {
      body {
        justify-content: center;
        padding: 1.5rem 0.75rem;
      }
      .avatar-wrapper { margin-bottom: 1rem; }
      .avatar { width: 80px; height: 80px; }
      .avatar-wrapper::before { inset: -5px; }
      .name { font-size: 1.3rem; margin-bottom: 1.25rem; }
      .name::after { width: 50%; margin-top: 4px; }

      .card-stack {
        width: 100%;
        max-width: 100%;
        height: 220px;
      }
      .card {
        padding: 1rem 1.15rem;
        border-radius: 12px;
      }
      .card-title { font-size: 0.6rem; margin-bottom: 0.5rem; padding-bottom: 0.45rem; }
      .card-icon { font-size: 1.4rem; margin-bottom: 0.4rem; }
      .card-item { padding: 0.35rem 0; font-size: 0.78rem; gap: 0.5rem; }
      .card-item-label { font-size: 0.65rem; min-width: 44px; }

      .footer { margin-top: 1rem; }
      .hint { margin-top: 0.5rem; }
    }
  </style>
</head>
<body>
  <canvas id="canvas-bg"></canvas>
  <div class="content">
    <div class="avatar-wrapper" id="avatarBtn" title="Click to reset">
      <img class="avatar" src="./avatar.jpg" alt="killo avatar">
    </div>
    <h1 class="name">killo</h1>

    <div class="card-stack" id="cardStack">
      <div class="card active" data-card="0">
        <div class="card-content">
          <div class="card-title">EARTH ONLINE PLAYER INFO</div>
          <div class="card-item">
            <span class="card-item-label">ID</span>
            <span class="card-item-value">killo</span>
          </div>
          <div class="card-item">
            <span class="card-item-label">LV</span>
            <span class="card-item-value">21</span>
          </div>
          <div class="card-item">
            <span class="card-item-label">SIGN</span>
            <span class="card-item-value" style="color:#b0b0bc;font-style:italic;">&ldquo;Keep it locked, oblivion&rdquo;</span>
          </div>
        </div>
      </div>
      <div class="card" data-card="1">
        <div class="card-content">
          <div class="card-icon">???</div>
          <div class="card-title">FAVORITE FOODS</div>
          <div class="card-item">
            <span class="card-item-label">01</span>
            <span class="card-item-value">?? Hamburger</span>
          </div>
          <div class="card-item">
            <span class="card-item-label">02</span>
            <span class="card-item-value">?? Cola</span>
          </div>
          <div class="card-item">
            <span class="card-item-label">03</span>
            <span class="card-item-value">?? Egg Custard</span>
          </div>
        </div>
      </div>
      <div class="card" data-card="2">
        <div class="card-content">
          <div class="card-icon">??</div>
          <div class="card-title">WANTS</div>
          <div class="card-item">
            <span class="card-item-label">01</span>
            <span class="card-item-value">?? Have a cat</span>
          </div>
          <div class="card-item">
            <span class="card-item-label">02</span>
            <span class="card-item-value">?? Have a home</span>
          </div>
          <div class="card-item">
            <span class="card-item-label">03</span>
            <span class="card-item-value">?? Sleep with loved one</span>
          </div>
        </div>
      </div>
    </div>

    <div class="hint" id="hint">-</div>
    <div class="footer">/etc/profile</div>
  </div>
  <script>
    var canvas = document.getElementById('canvas-bg');
    var ctx = canvas.getContext('2d');
    var W, H;
    function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
    resize(); window.addEventListener('resize', resize);

    var STAR_COUNT = 200;
    var bgStars = [];
    for (var i = 0; i < STAR_COUNT; i++) {
      bgStars.push({ x: Math.random(), y: Math.random(), r: 0.5 + Math.random() * 1.5,
        speed: 0.3 + Math.random() * 0.7, phase: Math.random() * Math.PI * 2,
        baseOpacity: 0.1 + Math.random() * 0.4 });
    }

    var virgoStars = [
      { label: 'Zavijava', x: 0.18, y: 0.22 }, { label: 'Zaniah', x: 0.48, y: 0.16 },
      { label: 'Vindemiatrix', x: 0.72, y: 0.12 }, { label: 'Minelauva', x: 0.40, y: 0.36 },
      { label: 'Porrima', x: 0.30, y: 0.52 }, { label: 'Auva', x: 0.58, y: 0.58 },
      { label: 'Syrma', x: 0.22, y: 0.68 }, { label: 'Spica', x: 0.45, y: 0.85 },
    ];
    var virgoEdges = [[0,1],[0,3],[1,2],[1,3],[3,4],[4,5],[4,6],[4,7],[5,7]];
    var virgoM = { baseX: 0.75, baseY: 0.25, size: 0.18, time: 0, orbitRadiusX: 0.08, orbitRadiusY: 0.05, orbitSpeed: 0.0015, orbitPhaseY: 1.3 };

    var decos = [
      { n:'Cas', s:[{x:0.1,y:0.1},{x:0.3,y:0.0},{x:0.5,y:0.15},{x:0.7,y:0.0},{x:0.9,y:0.1}], e:[[0,1],[1,2],[2,3],[3,4]], bx:0.12,by:0.12,sz:0.07,t:0, ox:0.04,oy:0.02,os:8e-4,py:0.7,c:'200,180,255' },
      { n:'Ursa', s:[{x:0.2,y:0.0},{x:0.4,y:0.0},{x:0.55,y:0.15},{x:0.35,y:0.22},{x:0.65,y:0.22},{x:0.8,y:0.38},{x:1.0,y:0.55}], e:[[0,1],[1,2],[2,3],[3,0],[2,4],[4,5],[5,6]], bx:0.85,by:0.8,sz:0.09,t:0, ox:0.03,oy:0.04,os:6e-4,py:1.1,c:'180,220,255' },
      { n:'Leo', s:[{x:0.0,y:0.4},{x:0.15,y:0.25},{x:0.05,y:0.1},{x:0.25,y:0.1},{x:0.4,y:0.2},{x:0.35,y:0.4}], e:[[0,1],[1,2],[2,3],[3,4],[4,5],[0,5]], bx:0.45,by:0.78,sz:0.08,t:0, ox:0.05,oy:0.03,os:1e-3,py:0.5,c:'220,190,255' },
      { n:'Ori', s:[{x:0.2,y:0.1},{x:0.7,y:0.15},{x:0.35,y:0.45},{x:0.5,y:0.5},{x:0.65,y:0.45},{x:0.25,y:0.85},{x:0.75,y:0.8}], e:[[0,1],[2,3],[3,4],[0,2],[1,4],[2,5],[4,6]], bx:0.15,by:0.7,sz:0.1,t:0, ox:0.04,oy:0.02,os:7e-4,py:0.9,c:'200,220,240' },
    ];

    var cards = document.querySelectorAll('.card');
    var hint = document.getElementById('hint');
    var cur = 0;
    function switchToCard(i) {
      cards.forEach(function(c, j) { c.classList.toggle('active', j === i); });
      cur = i;
      hint.textContent = ['earth online', 'favorite foods', 'wants'][i];
    }
    document.getElementById('avatarBtn').addEventListener('click', function() { switchToCard(0); });

    var mx = -1, my = -1, hi = -1;
    canvas.addEventListener('mousemove', function(e) { mx = e.clientX; my = e.clientY; });
    canvas.addEventListener('mouseleave', function() { mx = -1; my = -1; if (hi >= 0) { hi = -1; canvas.style.cursor = 'default'; } });
    canvas.addEventListener('click', function() { if (hi === 0) switchToCard(1); else if (hi === 1) switchToCard(2); });

    function absStars(data, cx, cy, sc) {
      var r = [];
      for (var i = 0; i < data.length; i++) r.push({ x: cx + (data[i].x - 0.5) * sc, y: cy + (data[i].y - 0.5) * sc });
      return r;
    }

    function draw(time) {
      ctx.clearRect(0, 0, W, H);
      for (var b = 0; b < bgStars.length; b++) {
        var s = bgStars[b]; var o = s.baseOpacity + Math.sin(time * 0.002 * s.speed + s.phase) * 0.3;
        ctx.beginPath(); ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,' + Math.max(0, o) + ')'; ctx.fill();
      }
      for (var d = 0; d < decos.length; d++) {
        var dc = decos[d]; dc.t += 1;
        var tt = dc.t * dc.os, ex = W * (dc.bx + Math.sin(tt) * dc.ox), ey = H * (dc.by + Math.cos(tt * dc.py) * dc.oy);
        var sc = Math.min(W, H) * dc.sz, ds = absStars(dc.s, ex, ey, sc);
        ctx.beginPath();
        for (var e = 0; e < dc.e.length; e++) { ctx.moveTo(ds[dc.e[e][0]].x, ds[dc.e[e][0]].y); ctx.lineTo(ds[dc.e[e][1]].x, ds[dc.e[e][1]].y); }
        ctx.strokeStyle = 'rgba(' + dc.c + ',0.1)'; ctx.lineWidth = 0.8; ctx.stroke();
        for (var i = 0; i < ds.length; i++) { ctx.beginPath(); ctx.arc(ds[i].x, ds[i].y, 1.2, 0, Math.PI * 2); ctx.fillStyle = 'rgba(' + dc.c + ',0.45)'; ctx.fill(); }
      }
      virgoM.time += 1;
      var vt = virgoM.time * virgoM.orbitSpeed;
      var vcx = W * (virgoM.baseX + Math.sin(vt) * virgoM.orbitRadiusX), vcy = H * (virgoM.baseY + Math.cos(vt * virgoM.orbitPhaseY) * virgoM.orbitRadiusY);
      var vsc = Math.min(W, H) * virgoM.size, vs = absStars(virgoStars, vcx, vcy, vsc);
      ctx.beginPath();
      for (var e = 0; e < virgoEdges.length; e++) { ctx.moveTo(vs[virgoEdges[e][0]].x, vs[virgoEdges[e][0]].y); ctx.lineTo(vs[virgoEdges[e][1]].x, vs[virgoEdges[e][1]].y); }
      ctx.strokeStyle = 'rgba(150, 200, 255, 0.04)'; ctx.lineWidth = 5; ctx.stroke();
      ctx.beginPath();
      for (var e = 0; e < virgoEdges.length; e++) { ctx.moveTo(vs[virgoEdges[e][0]].x, vs[virgoEdges[e][0]].y); ctx.lineTo(vs[virgoEdges[e][1]].x, vs[virgoEdges[e][1]].y); }
      ctx.strokeStyle = 'rgba(150, 200, 255, 0.12)'; ctx.lineWidth = 1; ctx.stroke();
      hi = -1;
      for (var i = 0; i < vs.length; i++) {
        var st = vs[i], dx = mx - st.x, dy = my - st.y, h = (Math.sqrt(dx*dx+dy*dy) < 14 && mx >= 0);
        if (h) { hi = i; canvas.style.cursor = 'pointer'; }
        var g = ctx.createRadialGradient(st.x, st.y, 0, st.x, st.y, h ? 24 : 14);
        g.addColorStop(0, h ? 'rgba(200,230,255,0.6)' : 'rgba(150,200,255,0.15)');
        g.addColorStop(1, 'transparent');
        ctx.beginPath(); ctx.arc(st.x, st.y, h ? 24 : 14, 0, Math.PI * 2); ctx.fillStyle = g; ctx.fill();
        ctx.beginPath(); ctx.arc(st.x, st.y, h ? 4 : 2.5, 0, Math.PI * 2);
        ctx.fillStyle = h ? '#d0e8ff' : 'rgba(180, 215, 255, 0.7)'; ctx.fill();
        if (h) { ctx.font = '11px Inter, sans-serif'; ctx.fillStyle = 'rgba(180, 210, 255, 0.8)'; ctx.textAlign = 'center';
          ctx.fillText('VIRGO . ' + virgoStars[i].label, st.x, st.y - 18); }
      }
      requestAnimationFrame(draw);
    }
    requestAnimationFrame(draw);
  </script>
</body>
</html>
